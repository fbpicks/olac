<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>NFBC Live Draft Board</title>

<style>
body { font-family: sans-serif; margin:20px; }
h2 { margin-top:40px; }

table {
  border-collapse: collapse;
  margin: 15px 0;
  font-size: 14px;
  min-width: 900px;
}

th, td {
  padding: 8px 10px;
  text-align: center;
  border-bottom: 1px solid #ddd;
}

thead {
  background-color: #00338D;
  color: white;
}

tr:nth-child(even) { background-color: #f3f3f3; }

th { cursor: pointer; }

.menu button {
  margin: 4px;
  padding: 6px 10px;
  cursor: pointer;
}

#loading {
  font-size: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="loading">Loading...</div>

<div class="menu">
  <button onclick="showMyTeam()">Roster</button>
  <button onclick="showAvailable('C')">C</button>
  <button onclick="showAvailable('1B')">1B</button>
  <button onclick="showAvailable('2B')">2B</button>
  <button onclick="showAvailable('SS')">SS</button>
  <button onclick="showAvailable('3B')">3B</button>
  <button onclick="showAvailable('OF')">OF</button>
  <button onclick="showAvailable('SP')">SP</button>
  <button onclick="showAvailable('RP')">RP</button>
  <button onclick="showAvailable('ALL')">All</button>
</div>

<div id="content"></div>

<script>

//////////////////////////////
// CONFIG
//////////////////////////////

const LEAGUE_ID = 817;
const MY_TEAM_ID = 4;
const SYSTEMS = ["oopsy","atc","thebatx"];

const HITTER_STATS = ["PA","mR","mRBI","mHR","mSB","mAVG"];
const PITCHER_STATS = ["IP","mW","mSO","mERA","mWHIP","mSV"];

let HV = [], PV = [];
let HV_DC = [], PV_DC = [];
let MY_HITTERS = [], MY_PITCHERS = [];

//////////////////////////////
// FETCH FANGRAPHS
//////////////////////////////

async function getFG(type, system){

  const base = "https://www.fangraphs.com/api/fantasy/auction-calculator/data";

  const params = new URLSearchParams({
    teams:12, lg:"MLB", dollars:300,
    type:type, proj:system,
    players:"", split:60,
    rep:0, drp:0, view:0
  });

  const res = await fetch(`${base}?${params}`);
  const json = await res.json();
  return json.data;
}

async function buildSet(type){
  const out = {};
  for(let sys of SYSTEMS){
    out[sys] = await getFG(type, sys);
  }
  return out;
}

//////////////////////////////
// MERGE SYSTEMS
//////////////////////////////

function mergeSystems(data){

  const map = new Map();
  const systems = Object.keys(data);

  for(let p of data[systems[0]]){
    map.set(p.playerid,{
      Name:p.Name,
      playerid:p.playerid,
      Team:p.Team,
      POS:p.POS
    });
  }

  for(let sys of systems){
    for(let p of data[sys]){
      if(map.has(p.playerid)){
        map.get(p.playerid)[sys.toUpperCase()] = +p.Dollars;
      }
    }
  }

  for(let p of map.values()){
    let total = 0;
    for(let sys of systems){
      total += p[sys.toUpperCase()] || 0;
    }
    p.AVG = +(total / systems.length).toFixed(1);
  }

  return Array.from(map.values())
    .sort((a,b)=>b.AVG-a.AVG);
}

//////////////////////////////
// AVERAGE STATS
//////////////////////////////

function avgStats(data, cols){

  const systems = Object.keys(data);
  const map = new Map();

  for(let sys of systems){
    for(let p of data[sys]){
      if(!map.has(p.playerid)){
        map.set(p.playerid,{});
      }
      for(let c of cols){
        map.get(p.playerid)[c] =
          (map.get(p.playerid)[c] || 0) + (+p[c]||0);
      }
    }
  }

  for(let p of map.values()){
    for(let c of cols){
      p[c] = +(p[c]/systems.length).toFixed(1);
    }
  }

  return map;
}

function mergeStats(players, statMap){
  for(let p of players){
    if(statMap.has(p.playerid)){
      Object.assign(p, statMap.get(p.playerid));
    }
  }
}

//////////////////////////////
// ADP
//////////////////////////////

async function loadADP(){

  const res = await fetch("ADP.tsv");
  const text = await res.text();

  const rows = text.split("\n");
  const headers = rows[0].split("\t");

  return rows.slice(1).map(r=>{
    const vals = r.split("\t");
    const obj = {};
    headers.forEach((h,i)=>obj[h]=vals[i]);
    return obj;
  });
}

function mergeADP(players, adp){
  const map = new Map();
  adp.forEach(p=>map.set(p.Name,p.ADP));
  players.forEach(p=>p.ADP = map.get(p.Name)||"");
}

//////////////////////////////
// DRAFT
//////////////////////////////

async function loadDraft(){

  const res = await fetch(
    `https://draft.shgn.com/api/public/players/dp/${LEAGUE_ID}`
  );

  const data = await res.json();

  return data
    .filter(p=>p.pick!==null)
    .map(p=>({
      Name:`${p.f} ${p.l}`,
      team:p.pick.do
    }));
}

//////////////////////////////
// TABLE BUILDER
//////////////////////////////

function buildTable(data){

  if(data.length===0){
    return "<p>No players.</p>";
  }

  const cols = Object.keys(data[0]);

  let html = "<table><thead><tr>";

  cols.forEach((c,i)=>{
    html += `<th onclick="sortTable(${i})">${c}</th>`;
  });

  html += "</tr></thead><tbody>";

  data.forEach(p=>{
    html+="<tr>";
    cols.forEach(c=>{
      html+=`<td>${p[c]??""}</td>`;
    });
    html+="</tr>";
  });

  html+="</tbody></table>";
  return html;
}

//////////////////////////////
// SORT
//////////////////////////////

let currentSort = {};

function sortTable(colIndex){

  const table = document.querySelector("table");
  const rows = Array.from(table.rows).slice(1);

  const dir = currentSort[colIndex] === 1 ? -1 : 1;
  currentSort[colIndex] = dir;

  rows.sort((a,b)=>{
    const A = a.cells[colIndex].innerText;
    const B = b.cells[colIndex].innerText;

    const numA = parseFloat(A);
    const numB = parseFloat(B);

    if(!isNaN(numA)&&!isNaN(numB)){
      return dir*(numA-numB);
    }
    return dir*A.localeCompare(B);
  });

  rows.forEach(r=>table.appendChild(r));
}

//////////////////////////////
// UI
//////////////////////////////

function showMyTeam(){
  document.getElementById("content").innerHTML =
    "<h2>My Hitters</h2>"+buildTable(MY_HITTERS)+
    "<h2>My Pitchers</h2>"+buildTable(MY_PITCHERS);
}

function showAvailable(pos){

  let data;

  if(pos==="ALL"){
    data = [...HV_DC,...PV_DC];
  }
  else if(["SP","RP"].includes(pos)){
    data = PV_DC.filter(p=>p.POS.includes(pos));
  }
  else{
    data = HV_DC.filter(p=>p.POS.includes(pos));
  }

  document.getElementById("content").innerHTML =
    `<h2>Available: ${pos}</h2>`+buildTable(data);
}

//////////////////////////////
// INIT
//////////////////////////////

async function init(){

  document.getElementById("loading").innerText="Loading projections...";

  const hitSys = await buildSet("hit");
  const pitSys = await buildSet("pit");

  HV = mergeSystems(hitSys);
  PV = mergeSystems(pitSys);

  mergeStats(HV, avgStats(hitSys,HITTER_STATS));
  mergeStats(PV, avgStats(pitSys,PITCHER_STATS));

  const adp = await loadADP();
  mergeADP(HV,adp);
  mergeADP(PV,adp);

  const taken = await loadDraft();
  const takenNames = new Set(taken.map(p=>p.Name));

  HV_DC = HV.filter(p=>!takenNames.has(p.Name));
  PV_DC = PV.filter(p=>!takenNames.has(p.Name));

  MY_HITTERS = HV.filter(p=>
    taken.some(t=>t.Name===p.Name && t.team==MY_TEAM_ID)
  );

  MY_PITCHERS = PV.filter(p=>
    taken.some(t=>t.Name===p.Name && t.team==MY_TEAM_ID)
  );

  document.getElementById("loading").innerText="Ready.";

  showMyTeam();
}

init();

</script>
</body>
</html>
